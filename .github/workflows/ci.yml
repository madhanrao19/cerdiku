name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: kpm
          POSTGRES_PASSWORD: kpm
          POSTGRES_DB: kpm
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U kpm"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

    env:
      DATABASE_URL: postgresql://kpm:kpm@localhost:5432/kpm?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-1234567890
      JWT_REFRESH_SECRET: ci-refresh-secret-1234567890
      AI_PROVIDER: anthropic # no key in CI → mock provider fallback

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Prepare database
        run: |
          pnpm --filter @kpm/api db:push
          pnpm --filter @kpm/api db:vector

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
